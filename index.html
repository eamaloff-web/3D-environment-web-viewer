<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="TemplateData/style.css">

  <script src="TemplateData/scorm-packager.js"></script>

<body>
  <div id="main-content">
    <div id="viewer-section">
      <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-fullscreen-button"></div>
      </div>
      <div id="uploadBtn">
        Upload Model
        <input type="file" id="imageLoader" accept=".glb">
      </div>
    </div>
    <div id="sidebar">
      <div id="annotate-Editor">
        <h3 id="editorTitle">New Annotation</h3>
        <form id="annotationForm">
          <label for="annotationTitle">Title</label>
          <input type="text" id="annotationTitle" placeholder="What is this?">
          <label for="annotationCoordinates">Coordinates</label>
          <input type="text" id="annotationCoordinates" readonly>
          <label for="annotationDescription">Description</label>
          <textarea id="annotationDescription" placeholder="Add some details..."></textarea>
          <label>Tags</label>
          <div class="tag-input-row">
            <input type="text" id="tagInput" placeholder="New tag...">
            <button type="button" id="addTagBtn">Add</button>
          </div>
          <div id="tags"></div>
          <div id="mediaThumbnails" class="media-thumbnail-strip"></div>
          <button type="button" id="saveAnnotationBtn">Save Annotation</button>
          <button type="button" id="cancelEditBtn">Cancel Edit</button>
          <div class="action-row">
            <!--
              exportBtn (Download JSON) replaced by mediaUploadBtn.
              Old code preserved:
              <button type="button" id="exportBtn" onclick="uploadJSON()">Download JSON</button>
            -->
            <button type="button" id="mediaUploadBtn">Attach Media</button>
            <input type="file" id="mediaFileInput" accept="image/*,video/*" multiple>
            <button type="button" id="clearBtn">Clear All</button>
            <script>

              {
                  let Title = document.getElementById("annotationTitle").value;
                  let Coordinates = document.getElementById("annotationCoordinates").value;
                  let Description = document.getElementById("annotationDescription").value;
                  let Tags = document.getElementById("tagInput").value;

                  unityInstance.SendMessage(
                      "FrappeManager",
                      "UploadJsonButton",
                      Title,
                      Coordinates,
                      Description,
                      Tags
                  );
              }*/
            </script>
          </div>
        </form>
      </div>
      <div id="annotation-list-container">
        <div class="saved-list-header">
          <h3>Saved List</h3>
          <button type="button" id="scormDownloadBtn" disabled>&#8615; Download SCORM Package</button>
        </div>
        <div id="annotationList"></div>
      </div>
    </div>
  </div>
  <a id="downloadLink" style="display:none;"></a>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var myUnityInstance = null;
    var currentTags = [];
    var allAnnotations = [];
    var editingIndex = -1;
    var currentMediaFiles = [];

    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/MergeTestWEBGL.loader.js";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/MergeTestWEBGL.data.unityweb",
      frameworkUrl: buildUrl + "/MergeTestWEBGL.framework.js.unityweb",
	  codeUrl: buildUrl + "/MergeTestWEBGL.wasm.unityweb",
	  streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "My project",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

// modified 
	  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);

      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";

      document.body.style.margin = "0";
      document.body.style.padding = "0";
      document.body.style.overflow = "hidden";

      var container = document.querySelector("#unity-container");
      container.style.setProperty("width", "100%", "important");
      container.style.setProperty("height", "100%", "important");
      container.style.setProperty("position", "fixed", "important");
      container.style.top = "0";
      container.style.left = "0";

      canvas.style.setProperty("width", "100%", "important");
      canvas.style.setProperty("height", "100%", "important");

    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }
// modified

      document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        myUnityInstance = unityInstance;
        document.querySelector("#unity-loading-bar").style.display = "none";
        document.querySelector("#unity-fullscreen-button").onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        canvas.addEventListener("click", function (e) {
          var rect = canvas.getBoundingClientRect();
          var scaleX = canvas.width / rect.width;
          var scaleY = canvas.height / rect.height;
          var x = (e.clientX - rect.left) * scaleX;
          var y = canvas.height - (e.clientY - rect.top) * scaleY;
          myUnityInstance.SendMessage("ModelLoader", "OnScreenClick", x + "," + y);
        });

      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);

    window.receiveWorldCoordinate = function (x, y, z) {
      window.lastAnnotationPoint = { x: parseFloat(x), y: parseFloat(y), z: parseFloat(z) };
      var coordInput = document.querySelector("#annotationCoordinates");
      if (coordInput) {
        coordInput.value = parseFloat(x).toFixed(3) + ", " + parseFloat(y).toFixed(3) + ", " + parseFloat(z).toFixed(3);
      }
    };

    document.querySelector("#addTagBtn").onclick = () => {
      var input = document.querySelector("#tagInput");
      var val = input.value.trim();
      if (val && !currentTags.includes(val)) {
        currentTags.push(val);
        renderTags();
        input.value = "";
      }
    };

    function renderTags() {
      var container = document.querySelector("#tags");
      container.innerHTML = "";
      currentTags.forEach(tag => {
        var chip = document.createElement("div");
        chip.className = "tag-chip";
        chip.textContent = tag;
        chip.onclick = () => {
          currentTags = currentTags.filter(t => t !== tag);
          renderTags();
        };
        container.appendChild(chip);
      });
    }

    function reindexOrders() {
      allAnnotations.forEach((a, i) => { a.order = i; });
    }

    document.querySelector("#saveAnnotationBtn").onclick = () => {
      var mediaSnapshot = currentMediaFiles.map(function(mf) {
        return { name: mf.name, type: mf.type, dataUrl: mf.dataUrl };
      });
      var annotation = {
        title: document.querySelector("#annotationTitle").value || "Untitled",
        coordinates: document.querySelector("#annotationCoordinates").value,
        description: document.querySelector("#annotationDescription").value,
        tags: [...currentTags],
        order: 0,
        mediaFiles: mediaSnapshot,
        imageUrls: mediaSnapshot.map(function(mf) { return mf.dataUrl; }),
        mediaType: mediaSnapshot.length > 0 ? (mediaSnapshot[0].type.startsWith("image/") ? "image" : "video") : "",
        mediaUrl: mediaSnapshot.length > 0 ? mediaSnapshot[0].dataUrl : ""
      };

      if (editingIndex >= 0) {
        annotation.order = allAnnotations[editingIndex].order;
        allAnnotations[editingIndex] = annotation;
        editingIndex = -1;
        document.querySelector("#saveAnnotationBtn").textContent = "Save Annotation";
        document.querySelector("#editorTitle").textContent = "New Annotation";
        document.querySelector("#cancelEditBtn").style.display = "none";
      } else {
        annotation.order = allAnnotations.length;
        allAnnotations.push(annotation);
      }

      reindexOrders();
      document.querySelector("#annotationForm").reset();
      currentTags = [];
      renderTags();
      currentMediaFiles = [];
      renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");
      renderAnnotationList();
      syncAnnotationsToUnity();
      updateScormBtnState();
    };

    var dragSrcIndex = null;

    function renderAnnotationList() {
      var list = document.querySelector("#annotationList");
      list.innerHTML = "";
      allAnnotations.forEach((anno, index) => {
        var item = document.createElement("div");
        item.className = "annotation-item";
        item.draggable = true;
        item.dataset.index = index;

        item.innerHTML = `
          <div class="annotation-header">
            <div class="annotation-header-left">
              <span class="annotation-order-badge">${index + 1}</span>
              <span class="drag-handle" title="Drag to reorder">⠿</span>
              <span class="annotation-title">${anno.title}</span>
            </div>
            <div class="annotation-actions">
              <button class="btn-small delete-btn" onclick="event.stopPropagation(); deleteAnnotation(${index})">Del</button>
            </div>
          </div>
          <div class="coord-text">${anno.coordinates}</div>
          <div class="anno-tags-text">Tags: ${anno.tags.join(", ") || "None"}</div>
          <div class="anno-media-strip" id="anno-media-strip-${index}"></div>
        `;

        item.addEventListener("click", (e) => {
          if (!e.target.classList.contains("drag-handle") && !e.target.classList.contains("delete-btn")) {
            editAnnotation(index);
          }
        });

        item.addEventListener("dragstart", (e) => {
          dragSrcIndex = index;
          e.dataTransfer.effectAllowed = "move";
          item.classList.add("dragging");
        });

        item.addEventListener("dragend", () => {
          item.classList.remove("dragging");
          document.querySelectorAll(".annotation-item").forEach(el => el.classList.remove("drag-over"));
        });

        item.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          document.querySelectorAll(".annotation-item").forEach(el => el.classList.remove("drag-over"));
          item.classList.add("drag-over");
        });

        item.addEventListener("drop", (e) => {
          e.preventDefault();
          var targetIndex = parseInt(item.dataset.index);
          if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
          var moved = allAnnotations.splice(dragSrcIndex, 1)[0];
          allAnnotations.splice(targetIndex, 0, moved);
          dragSrcIndex = null;
          reindexOrders();
          renderAnnotationList();
          syncAnnotationsToUnity();
        });

        list.appendChild(item);

        if (anno.mediaFiles && anno.mediaFiles.length > 0) {
          var strip = document.getElementById("anno-media-strip-" + index);
          if (strip) {
            anno.mediaFiles.forEach(function(mf) {
              var wrapper = document.createElement("div");
              wrapper.className = "media-thumb-wrapper";
              if (mf.type && mf.type.startsWith("image/")) {
                var img = document.createElement("img");
                img.className = "media-thumb media-thumb-small";
                img.src = mf.dataUrl;
                img.title = mf.name;
                wrapper.appendChild(img);
              } else {
                var icon = document.createElement("div");
                icon.className = "media-thumb media-thumb-small media-thumb-video-icon";
                icon.title = mf.name;
                icon.textContent = "▶";
                wrapper.appendChild(icon);
              }
              strip.appendChild(wrapper);
            });
          }
        }
      });
    }

    window.editAnnotation = (index) => {
      var anno = allAnnotations[index];
      editingIndex = index;
      document.querySelector("#annotationTitle").value = anno.title;
      document.querySelector("#annotationCoordinates").value = anno.coordinates;
      document.querySelector("#annotationDescription").value = anno.description;
      currentTags = [...anno.tags];
      renderTags();
      currentMediaFiles = (anno.mediaFiles || []).map(function(mf) {
        return { name: mf.name, type: mf.type, dataUrl: mf.dataUrl };
      });
      renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");

      document.querySelector("#saveAnnotationBtn").textContent = "Update Annotation";
      document.querySelector("#editorTitle").textContent = "Editing Annotation";
      document.querySelector("#cancelEditBtn").style.display = "block";
    };

    document.querySelector("#cancelEditBtn").onclick = () => {
      editingIndex = -1;
      document.querySelector("#annotationForm").reset();
      currentTags = [];
      renderTags();
      currentMediaFiles = [];
      renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");
      document.querySelector("#saveAnnotationBtn").textContent = "Save Annotation";
      document.querySelector("#editorTitle").textContent = "New Annotation";
      document.querySelector("#cancelEditBtn").style.display = "none";
    };

    function syncAnnotationsToUnity() {
      // Strip JS-only mediaFiles (large dataUrls/objectUrls) before sending to Unity;
      // send only filenames so Unity can reference packed SCORM paths.
      var annotationsForUnity = allAnnotations.map(function(anno) {
        var clone = Object.assign({}, anno);
        if (anno.mediaFiles && anno.mediaFiles.length > 0) {
          clone.imageUrls = anno.mediaFiles.map(function(mf) { return mf.name; });
          clone.mediaType = anno.mediaFiles[0].type.startsWith("image/") ? "image" : "video";
          clone.mediaUrl = anno.mediaFiles[0].name;
        } else {
          clone.imageUrls = clone.imageUrls || [];
          clone.mediaType = clone.mediaType || "";
          clone.mediaUrl = clone.mediaUrl || "";
        }
        delete clone.mediaFiles;
        return clone;
      });
      let jsonPayload = JSON.stringify({ modelName: window.currentModelName || "Unknown", allAnnotations: annotationsForUnity });
      if (myUnityInstance) {
        myUnityInstance.SendMessage("FrappeManager", "SyncAnnotations", jsonPayload);
      }
    }

    window.deleteAnnotation = (index) => {
      if (confirm("Delete this annotation?")) {
        allAnnotations.splice(index, 1);
        reindexOrders();
        renderAnnotationList();
        syncAnnotationsToUnity();
        updateScormBtnState();
      }
    };

    document.querySelector("#exportBtn").onclick = () => {
      uploadJSON();
      if (allAnnotations.length === 0) {
        alert("No annotations to download! Please save at least one annotation first.");
        return;
      }
      var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allAnnotations, null, 2));
      var dlAnchorElem = document.getElementById('downloadLink');
      dlAnchorElem.setAttribute("href", dataStr);
      dlAnchorElem.setAttribute("download", "annotations.json");
      dlAnchorElem.click();

    */

    document.querySelector("#mediaUploadBtn").onclick = () => {
      document.querySelector("#mediaFileInput").click();
    };

    document.querySelector("#mediaFileInput").addEventListener("change", function(e) {
      var files = Array.from(e.target.files);
      var remaining = 5 - currentMediaFiles.length;
      if (remaining <= 0) {
        alert("Maximum 5 media files per annotation.");
        this.value = "";
        return;
      }
      if (files.length > remaining) {
        alert("Maximum 5 media files per annotation. Only the first " + remaining + " will be added.");
        files = files.slice(0, remaining);
      }
      var pending = files.length;
      if (pending === 0) return;
      files.forEach(function(file) {
        if (file.type.startsWith("image/")) {
          var reader = new FileReader();
          reader.onload = function(ev) {
            currentMediaFiles.push({ name: file.name, type: file.type, dataUrl: ev.target.result });
            pending--;
            if (pending === 0) renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");
          };
          reader.readAsDataURL(file);
        } else if (file.type.startsWith("video/")) {
          var objectUrl = URL.createObjectURL(file);
          currentMediaFiles.push({ name: file.name, type: file.type, dataUrl: objectUrl });
          pending--;
          if (pending === 0) renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");
        } else {
          pending--;
          if (pending === 0) renderMediaThumbnails(currentMediaFiles, "mediaThumbnails");
        }
      });
      this.value = "";
    });

    function renderMediaThumbnails(mediaFiles, containerId) {
      var container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = "";
      mediaFiles.forEach(function(mf, i) {
        var wrapper = document.createElement("div");
        wrapper.className = "media-thumb-wrapper";
        if (mf.type.startsWith("image/")) {
          var img = document.createElement("img");
          img.className = "media-thumb";
          img.src = mf.dataUrl;
          img.title = mf.name;
          wrapper.appendChild(img);
        } else {
          var vid = document.createElement("video");
          vid.className = "media-thumb";
          vid.src = mf.dataUrl;
          vid.muted = true;
          vid.setAttribute("playsinline", "");
          vid.setAttribute("preload", "metadata");
          wrapper.appendChild(vid);
        }
        var removeBtn = document.createElement("button");
        removeBtn.className = "media-thumb-remove";
        removeBtn.textContent = "×";
        removeBtn.onclick = (function(idx) {
          return function(ev) {
            ev.stopPropagation();
            currentMediaFiles.splice(idx, 1);
            renderMediaThumbnails(currentMediaFiles, containerId);
          };
        })(i);
        wrapper.appendChild(removeBtn);
        container.appendChild(wrapper);
      });
    }

    document.querySelector("#clearBtn").onclick = () => {
      if (confirm("Clear all saved annotations?")) {
        allAnnotations = [];
        reindexOrders();
        renderAnnotationList();
        syncAnnotationsToUnity();
        updateScormBtnState();
      }
    };

    function updateScormBtnState() {
      var btn = document.querySelector("#scormDownloadBtn");
      var hasAnnotations = allAnnotations.length > 0;
      var hasModel = !!window.currentModelName;
      btn.disabled = !(hasAnnotations && hasModel);
    }

    document.querySelector("#imageLoader").addEventListener("change", function (e) {
      var file = e.target.files[0];
      if (!file || !file.name.toLowerCase().endsWith(".glb")) return;
      window.currentModelName = file.name.replace(".glb", "");
      window.currentModelFileUrl = URL.createObjectURL(file);
      console.log("MODEL NAME:", window.currentModelName);
      if (myUnityInstance) myUnityInstance.SendMessage("ModelLoader", "LoadGLB", window.currentModelFileUrl);
      updateScormBtnState();
    });


    document.querySelector("#scormDownloadBtn").onclick = () => {
      downloadSCORMPackage();
    };
  </script>
</body>
